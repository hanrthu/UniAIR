resume: null
model:
  model_type: rde_ddg
  rde_checkpoint: ./trained_models/RDE/RDE.pt
  encoder:
    node_feat_dim: 128
    pair_feat_dim: 64
    num_layers: 3
  pre_transform_cfg:
    resolution: backbone+CB
    
train:
  max_iters: 30_000
  val_freq: 1000
  seed: 2024
  max_grad_norm: 100.0
  optimizer:
    type: adam
    lr: 3.e-4
    weight_decay: 0.0
    beta1: 0.9
    beta2: 0.999
  scheduler:
    type: plateau
    factor: 0.8
    patience: 5
    min_lr: 1.e-6